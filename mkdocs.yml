site_name: Civilizational Vector State (cvs)
site_description: >-
  Pipeline bayésien d'affiliation civilisationnelle des États souverains à
  partir de sources publiques (Huntington, Inglehart-Welzel, Hofstede, WVS).
  Deux bases (documentaire + vectorielle), second moment civilisationnel M(s),
  algèbre des distances multi-métriques. v3.0 — taxonomie + méthodologie
  + États + carte interactive + base vectorielle + moments M(s) + distances
  + critiques anticipées + validation empirique externe + sensibilité
  + baseline non-supervisé + glossaire.
site_url: https://s-geffroy.github.io/cvs/
repo_url: https://github.com/s-geffroy/cvs
repo_name: s-geffroy/cvs
edit_uri: edit/main/site_src/docs/
docs_dir: site_src/docs
site_dir: dist

strict: true

theme:
  name: material
  custom_dir: site_src/overrides
  language: fr
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - content.action.edit
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Thème sombre
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Thème clair

extra_css:
  - assets/css/extra.css
  - https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.min.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.min.js
  - https://cdn.plot.ly/plotly-2.35.2.min.js
  - assets/js/map.js
  - assets/js/basis_viz.js
  - assets/js/moments.js
  - assets/js/distances.js

not_in_nav: |
  /states/*.md
  !/states/index.md
  /vulgarisation/**

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search

nav:
  - Accueil: index.md
  - Éthique: ethics.md
  - Méthodologie:
      - methodology/index.md
      - "00 — Décisions": methodology/00_project_decisions.md
      - "01 — Modèle conceptuel": methodology/01_conceptual_model.md
      - "02 — Source-only": methodology/02_source_only_methodology.md
      - "03 — Scope État": methodology/03_state_first_scope.md
      - "04 — ADM1 préparé": methodology/04_adm1_preparation_policy.md
      - "05 — Calibration scoring": methodology/05_scoring_calibration.md
      - "06 — Outputs": methodology/06_outputs_and_storage.md
      - "07 — Éthique publication": methodology/07_ethics_publication_policy.md
      - "08 — Base civilisationnelle": methodology/08_civilizational_basis.md
      - "09 — Second moment civilisationnel": methodology/09_civilizational_second_moment.md
      - "10 — Algèbre des distances": methodology/10_distance_algebra.md
      - "11 — Critiques et réponses": methodology/11_critiques_and_responses.md
      - "12 — Validation empirique externe": methodology/12_empirical_validation.md
      - "13 — Analyse de sensibilité": methodology/13_sensitivity_analysis.md
      - "14 — Baseline non-supervisé": methodology/14_baseline_unsupervised.md
      - "15 — Glossaire": methodology/15_glossary.md
      - "16 — Cascade d'imputation": methodology/16_imputation_cascade.md
  - Taxonomie:
      - taxonomy/index.md
      - Civilisations:
          - taxonomy/civilizations/western.md
          - taxonomy/civilizations/orthodox.md
          - taxonomy/civilizations/islamic.md
          - taxonomy/civilizations/sinic.md
          - taxonomy/civilizations/hindic.md
          - taxonomy/civilizations/japanese.md
          - taxonomy/civilizations/buddhist.md
          - taxonomy/civilizations/latin_american.md
          - taxonomy/civilizations/african.md
          - taxonomy/civilizations/indigenous.md
          - taxonomy/civilizations/oceanian.md
  - États:
      - states/index.md
  - Carte: map/index.md
  - Base vectorielle: basis/index.md
  - Moments M(s): moments/index.md
  - Distances: distances/index.md
  - Sources: sources/index.md
  - Schémas: schemas/index.md
  - ADM1 (préparé): adm1_policy.md
  - Relecture: review/index.md
  - "Vulgarisation ↗": https://s-geffroy.github.io/cvs/vulgarisation/index.html
